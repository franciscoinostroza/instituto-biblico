[phases.setup]
nixPkgs = [
  "php83",
  "php83Packages.composer",
  "php83Extensions.pdo_pgsql",
  "php83Extensions.gd",
  "php83Extensions.mbstring",
  "php83Extensions.xml",
  "php83Extensions.bcmath",
  "php83Extensions.tokenizer",
  "php83Extensions.ctype",
  "php83Extensions.fileinfo",
  "php83Extensions.curl",
  "php83Extensions.zip",
  "php83Extensions.intl",
]

[phases.install]
cmds = [
  "composer update --no-dev --optimize-autoloader --no-interaction --prefer-dist",
]

[start]
cmd = "php artisan migrate --force && php artisan config:cache && php artisan route:cache && php artisan serve --host=0.0.0.0 --port=$PORT"
